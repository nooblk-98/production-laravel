services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: production-laravel:latest
    container_name: production-laravel-app
    expose:
      - "9000"
    volumes:
      - laravel-storage:/var/www/html/storage
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: production-laravel-nginx
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./application:/var/www/html:ro
      - laravel-storage:/var/www/html/storage:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  laravel-storage:
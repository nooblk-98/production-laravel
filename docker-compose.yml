services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: production-laravel:latest
    container_name: production-laravel
    ports:
      - "8080:80"
    volumes:
      - /var/www/application/storage:/var/www/html/storage
      - /var/www/application/.env:/var/www/html/.env
    restart: unless-stopped

networks:
  db-network:
    external: true
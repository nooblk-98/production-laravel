services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: production-laravel:latest
    container_name: production-laravel-app
    expose:
      - "9000"
    volumes:
      - /var/www/application/storage:/var/www/html/storage
      - /var/www/application/.env:/var/www/html/.env
    networks:
      - db-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: production-laravel-nginx
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - db-network
    restart: unless-stopped

networks:
  db-network:
    external: true
